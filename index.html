<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Financeira</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pago { opacity: 0.5; filter: grayscale(1); }
        .loading-overlay { display: none; }
        .is-loading .loading-overlay { display: flex; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 pb-12">

    <div id="app-card" class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden relative">
        <div class="loading-overlay absolute inset-0 bg-white/60 z-10 flex items-center justify-center">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
        </div>

        <header class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-xl font-bold uppercase tracking-widest">Gestão Financeira</h1>
            <div class="flex justify-around mt-4">
                <div class="text-center">
                    <p class="text-[10px] opacity-80 uppercase">Pendente</p>
                    <p id="resumo-pendente" class="font-bold text-lg text-red-200">R$ 0,00</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] opacity-80 uppercase">Total</p>
                    <p id="resumo-total" class="font-bold text-lg">R$ 0,00</p>
                </div>
            </div>
        </header>

        <div id="bills-list" class="p-4 space-y-3 min-h-[200px]">
            <p class="text-center text-gray-400 py-8">Carregando...</p>
        </div>

        <footer class="p-4 border-t">
            <button onclick="syncData()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all">
                ATUALIZAR DA PLANILHA
            </button>
        </footer>
    </div>

    <script>
        // COLE AQUI A NOVA URL QUE VOCÊ GEROU NO PASSO 1
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxEQxK5hEvKq9XfhG-ohIkRrLcnEDALcQ8ItzZpB-g5Bz8SlGeowJlvitS45QeCCiIqbg/exec"; 
        
        let billsData = [];

        async function syncData() {
            const card = document.getElementById('app-card');
            card.classList.add('is-loading');
            
            try {
                // Adicionado redirect: "follow" para resolver o erro de CORS do Google
                const response = await fetch(WEB_APP_URL, { redirect: "follow" });
                if (!response.ok) throw new Error("Erro na rede");
                
                billsData = await response.json();
                renderBills();
            } catch (e) {
                console.error("Erro detalhado:", e);
                document.getElementById('bills-list').innerHTML = `
                    <div class="text-center p-4">
                        <p class="text-red-500 font-bold">Erro de Sincronização</p>
                        <p class="text-xs text-gray-500 mt-2">Verifique se a implantação está como "Qualquer pessoa" e use uma "Nova Versão".</p>
                    </div>`;
            } finally {
                card.classList.remove('is-loading');
            }
        }

        function renderBills() {
            const listElement = document.getElementById('bills-list');
            listElement.innerHTML = '';
            let total = 0, pendente = 0;

            billsData.forEach(bill => {
                const valorNum = parseFloat(bill.valor) || 0;
                total += valorNum;
                if (!bill.status) pendente += valorNum;

                const div = document.createElement('div');
                div.className = `flex items-center p-4 border rounded-2xl transition-all ${bill.status ? 'bg-gray-50 pago border-transparent' : 'bg-white shadow-sm border-blue-50'}`;
                
                div.innerHTML = `
                    <input type="checkbox" ${bill.status ? 'checked' : ''} 
                           onchange="toggleBill('${bill.id}', this.checked)" class="h-6 w-6 text-blue-600">
                    <div class="ml-4 flex-1">
                        <label class="block font-bold text-gray-700 leading-tight">${bill.label}</label>
                        <span class="text-[10px] font-bold text-gray-400 uppercase">Dia ${bill.vencimento}</span>
                    </div>
                    <div class="text-right">
                        <span class="block font-bold text-blue-600">R$ ${valorNum.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                    </div>
                `;
                listElement.appendChild(div);
            });

            document.getElementById('resumo-total').innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('resumo-pendente').innerText = `R$ ${pendente.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        }

        async function toggleBill(id, status) {
            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Essencial para evitar bloqueio de CORS no POST do Google
                    body: JSON.stringify({ id, status })
                });
                const bill = billsData.find(b => b.id === id);
                if (bill) bill.status = status;
                renderBills();
            } catch (e) {
                console.error("Erro ao salvar:", e);
            }
        }

        if(WEB_APP_URL !== "https://script.google.com/macros/s/AKfycbxEQxK5hEvKq9XfhG-ohIkRrLcnEDALcQ8ItzZpB-g5Bz8SlGeowJlvitS45QeCCiIqbg/exec") syncData();
    </script>
</body>
</html>
